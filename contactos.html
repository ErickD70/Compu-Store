<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Usa tu mismo CSS -->
    <link rel="stylesheet" href="css/style.css">

    <title>Compu Store - Contactos</title>
</head>

<body>

<header>

    <nav>

        <h1>Compu Store</h1>

        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="registro.html" class="active">Registro</a></li>
        </ul>

    </nav>

</header>

<section class="registro">

    <h2>Contáctanos</h2>

    <form>

        <input 
        type="text" 
        placeholder="Nombre completo">

        <input 
        type="email" 
        placeholder="Correo electrónico">

        <input 
        type="text" 
        placeholder="Número de teléfono">

        <textarea 
        placeholder="Escribe tu mensaje"
        rows="5"
        style="padding:12px;border-radius:5px;border:1px solid #ccc;">
        </textarea>

        <button type="submit">
            Enviar mensaje
        </button>

    </form>

</section>

<section class="productos">

<h2>Información de contacto</h2>

<div class="contenedor-productos">


    <div class="card">

        <h3>📍 Dirección</h3>

        <p>
            San Salvador, El Salvador
        </p>

    </div>


    <div class="card">

        <h3>📞 Teléfono</h3>

        <p>
            +503 0000-0000
        </p>

    </div>

    <div class="card">

        <h3>✉ Correo</h3>

        <p>
            contacto@compustore.com
        </p>

    </div>


</div>

</section>

<footer>

<p>
© 2026 Compu Store | Todos los derechos reservados
</p>

</footer>

</body>

</html>
